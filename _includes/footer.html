<footer class="site-footer">
  <div class="footer-content">
    <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author.name }} | {{ site.author.affiliation }}</p>
    <p>邮箱: {{ site.author.email }}</p>
    
    <div class="social-links">
      {% if site.author.scholar %}
      <a href="{{ site.author.scholar }}" target="_blank" rel="noopener" aria-label="Google Scholar" title="Google Scholar">
        🎓
      </a>
      {% endif %}
      
      {% if site.author.github %}
      <a href="{{ site.author.github }}" target="_blank" rel="noopener" aria-label="GitHub" title="GitHub">
        💻
      </a>
      {% endif %}
      
      {% if site.author.researchgate %}
      <a href="{{ site.author.researchgate }}" target="_blank" rel="noopener" aria-label="ResearchGate" title="ResearchGate">
        🔬
      </a>
      {% endif %}
      
      {% if site.author.orcid %}
      <a href="{{ site.author.orcid }}" target="_blank" rel="noopener" aria-label="ORCID" title="ORCID">
        🆔
      </a>
      {% endif %}
    </div>
  </div>
</footer>

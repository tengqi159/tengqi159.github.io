# 网站配置
title: "滕起 | 南京大学博士 | 直聘副研究员"
description: "南京大学博士｜直聘副研究员｜深度学习、可穿戴计算、人体活动识别（HAR）与主动健康管理"
url: "https://tengqi159.github.io"
baseurl: ""

# 作者信息
author:
  name: "滕起"
  name_en: "Qi Teng"
  position: "直聘副研究员"
  affiliation: "郑州大学信息管理学院"
  location: "河南 郑州"
  email: "teqi159@gmail.com"
  avatar: "assets/images/avatar.jpg"
  bio: "深度学习・可穿戴计算・人体活动识别"
  
  # 社交链接
  scholar: "https://scholar.google.com/citations?user=D5kHbeAAAAAJ&hl=en"
  github: "https://github.com/tengqi159"
  researchgate: "https://www.researchgate.net/profile/Qi-Teng"
  orcid: "https://orcid.org/0000-0003-3573-4146"

# 统计数据
statistics:
  citations: 630
  publications: 10
  h_index: 11

# 构建设置
markdown: kramdown
encoding: utf-8
permalink: pretty

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - README.md

# 包含文件
include:
  - _pages

# 集合
collections:
  pages:
    output: true
    permalink: /:path/

# 默认值
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
    values:
      layout: "default"

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# SEO
lang: zh-CN
